name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "v1/**"
  workflow_dispatch:

env:
  DEPLOY_HOST: 100.75.139.86
  DEPLOY_USER: deploy
  DEPLOY_PATH: /opt/domo/v1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Backend lint & test placeholder ───
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          pip install ruff
        continue-on-error: true

      - name: Lint backend
        run: ruff check backend/app || true

      # ─── Frontend lint & build ───
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: ./v1/frontend
        run: npm install
        continue-on-error: true

      - name: Build frontend
        working-directory: ./v1/frontend
        run: npm run build
        continue-on-error: true

      # ─── Deploy via SSH ───
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files via rsync
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '__pycache__' \
            --exclude '.venv' \
            --exclude '.env' \
            ./ ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Restart docker compose on server
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            cd /opt/domo/v1
            docker compose pull
            docker compose up -d --build
            docker compose exec -T backend alembic upgrade head
            docker compose ps
          EOF
