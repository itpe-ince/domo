# =============================================================================
# Domo Service — nginx reverse proxy (single-file config for all 3 domains)
#
# 배치 경로: /etc/nginx/sites-available/domo
# 활성화:    sudo ln -s /etc/nginx/sites-available/domo \
#                      /etc/nginx/sites-enabled/domo
#            sudo nginx -t && sudo systemctl reload nginx
#
# 도메인:
#   domo.tuzigroup.com        → Frontend Next.js   (host port 3700)
#   domo-admin.tuzigroup.com  → Admin Next.js      (host port 3800)
#   domo-api.tuzigroup.com    → Backend FastAPI    (host port 3710)
#
# 주요 특이점:
#   - 와일드카드 인증서 1장(*.tuzigroup.com) 공유
#   - Backend: 1GB making_video 업로드 + Stripe webhook(raw body 보존)
#   - Admin: WebAuthn/Passkey용 Permissions-Policy 헤더 필수
#   - Next.js _next/static은 immutable 캐시
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────
# 1. HTTP → HTTPS 리다이렉트 (3 도메인 모두)
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name domo.tuzigroup.com domo-admin.tuzigroup.com domo-api.tuzigroup.com;

    # Let's Encrypt http-01 challenge만 80포트로 통과
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ─────────────────────────────────────────────────────────────────────────
# 2. Frontend (사용자 앱) — domo.tuzigroup.com → :3700
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name domo.tuzigroup.com;

    access_log /var/log/nginx/domo-frontend.access.log;
    error_log  /var/log/nginx/domo-frontend.error.log warn;

    # ── TLS (와일드카드 인증서 공유) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/www.tuzigroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.tuzigroup.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── 보안 헤더 ─────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # Next.js 정적 자원 — 영구 캐시 (hash 기반 파일명)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3700;
        proxy_http_version 1.1;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        proxy_set_header Host $host;
    }

    location /_next/image {
        proxy_pass http://127.0.0.1:3700;
        proxy_http_version 1.1;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600" always;
        proxy_set_header Host $host;
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3700;
        access_log off;
        log_not_found off;
    }

    # 그 외 모든 페이지 (SSR 포함)
    location / {
        proxy_pass http://127.0.0.1:3700;
        proxy_http_version 1.1;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}


# ─────────────────────────────────────────────────────────────────────────
# 3. Admin Console — domo-admin.tuzigroup.com → :3800
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name domo-admin.tuzigroup.com;

    access_log /var/log/nginx/domo-admin.access.log;
    error_log  /var/log/nginx/domo-admin.error.log warn;

    ssl_certificate     /etc/letsencrypt/live/www.tuzigroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.tuzigroup.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── 보안 헤더 (admin 강화) ───────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # admin은 어떤 사이트에서도 iframe 임베드 금지 (clickjacking 방어)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # ⚠️ WebAuthn / Passkey 활성화 — 일부 브라우저는 이 헤더 없이 차단
    add_header Permissions-Policy "publickey-credentials-get=(self), publickey-credentials-create=(self)" always;

    client_max_body_size 10M;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3800;
        proxy_http_version 1.1;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        proxy_set_header Host $host;
    }

    location /_next/image {
        proxy_pass http://127.0.0.1:3800;
        proxy_http_version 1.1;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600" always;
        proxy_set_header Host $host;
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3800;
        access_log off;
        log_not_found off;
    }

    location / {
        proxy_pass http://127.0.0.1:3800;
        proxy_http_version 1.1;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}


# ─────────────────────────────────────────────────────────────────────────
# 4. Backend API — domo-api.tuzigroup.com → :3710
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name domo-api.tuzigroup.com;

    access_log /var/log/nginx/domo-api.access.log;
    error_log  /var/log/nginx/domo-api.error.log warn;

    ssl_certificate     /etc/letsencrypt/live/www.tuzigroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.tuzigroup.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 업로드 본문 크기: making_video 1GB 대응 + 여유분
    client_max_body_size 1100M;

    # ── ① 미디어 업로드 — 대용량 + 장시간 처리 ────────────────────────────
    # POST /v1/media/upload — Pillow 이미지 처리 + 썸네일 3개 생성에 분 소요 가능
    # POST /v1/media/upload-local — local storage용 presigned 업로드 callback
    location ~ ^/v1/media/upload {
        proxy_pass http://127.0.0.1:3710;
        proxy_http_version 1.1;

        # 업로드 본문이 클 때 nginx가 디스크 버퍼링하면 latency↑
        proxy_request_buffering  off;
        proxy_buffering          off;
        chunked_transfer_encoding on;

        proxy_read_timeout    600s;   # 10분 — 1GB upload + processing
        proxy_send_timeout    600s;
        proxy_connect_timeout 30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── ② 미디어 파일 서빙 (local storage 모드) ─────────────────────────
    # production은 보통 S3/CDN이므로 거의 hit 안 됨. 안전망.
    location /v1/media/files/ {
        proxy_pass http://127.0.0.1:3710;
        proxy_http_version 1.1;

        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400, immutable" always;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── ③ Stripe webhook — body 변경 금지 (signature 검증) ───────────────
    # backend의 webhook handler가 raw body로 HMAC 검증 → 변형 금지
    location = /v1/webhooks/stripe {
        proxy_pass http://127.0.0.1:3710;
        proxy_http_version 1.1;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── ④ Health check — 캐시 / 로그 최소화 ──────────────────────────────
    location = /v1/health {
        proxy_pass http://127.0.0.1:3710;
        access_log off;
        proxy_read_timeout 5s;
        proxy_set_header Host $host;
    }

    # ── ⑤ 그 외 모든 API 경로 ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3710;
        proxy_http_version 1.1;

        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backend의 rate limiter가 X-Forwarded-For로 진짜 client IP 식별
        # (core/rate_limit.py의 _get_client_ip)
    }
}
